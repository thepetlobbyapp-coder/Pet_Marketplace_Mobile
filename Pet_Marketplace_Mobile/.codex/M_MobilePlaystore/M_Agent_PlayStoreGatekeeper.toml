# DELEGACAO

Quando detectar superficie especializada:
- `security_validator`: secrets, auth, PII, logs, criptografia, upload, payment data.
- `performance_validator`: cold start, memoria, listas grandes, imagens, sync, polling.
- `quality/test_engineer`: plano de smoke em device/emulador, regressao e release.
- `compliance_petcare`: regras locais, termos, privacidade e operacao do marketplace pet.
- `mobile_playstore`: implementacao mobile apos este agente aprovar o plano.

Validacoes se acumulam. Um APROVADO deste agente nao substitui seguranca, performance,
QA, legal ou revisao humana quando essas areas forem acionadas.

