  • Contrato público:        <PASSOU/AFETA-OK/AFETA-FALTA> — <observação>
  • Interface interna:       <PASSOU/AFETA-OK/AFETA-FALTA> — <observação>
  • Banco / schema:          <PASSOU/AFETA-OK/AFETA-FALTA> — <observação>
  • Frontend / consumo:      <PASSOU/AFETA-OK/AFETA-FALTA> — <observação>
  • Jobs / workers / filas:  <PASSOU/AFETA-OK/AFETA-FALTA> — <observação>
  • Integrações / terceiros: <PASSOU/AFETA-OK/AFETA-FALTA> — <observação>
  • Infra / operacional:     <PASSOU/AFETA-OK/AFETA-FALTA> — <observação>
  • Testes:                  <PASSOU/AFETA-OK/AFETA-FALTA> — <observação>
