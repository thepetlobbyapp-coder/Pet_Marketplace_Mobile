## ACHADOS POR SEVERIDADE

### 🔴 CRÍTICO (bloqueia merge)

- **services/payment.ts:3** — Null handling ausente em `findOne`
  - **O que:** `db.users.findOne` pode retornar null; código usa `user.stripeId` sem guard.
  - **Por que é problema:** TypeError em runtime quando userId não existe ou stripeId é null.
  - **Como verificar:** chamar `chargeCustomer("id-inexistente", 100)`.
  - **Eixo violado:** Eixo 1 — Corretude lógica

- **services/payment.ts:5** — Multiplicação `amount * 100` sem validar tipo
  - **O que:** Se `amount` vier como string ("50"), JavaScript faz `"50" * 100 = 5000`
    parece funcionar; mas `null * 100 = 0` cobra zero, e `"abc" * 100 = NaN` falha
    obscuramente no Stripe.
  - **Por que é problema:** Cobrança de valor errado ou erro genérico do Stripe sem
    contexto.
  - **Como verificar:** validar com zod/joi antes da multiplicação.
  - **Eixo violado:** Eixo 1 — Corretude lógica

- **services/payment.ts:9** — Log vaza dados sensíveis
  - **O que:** `console.log({ user, amount, result })` logga objeto user inteiro
    (provavelmente com email, possivelmente endereço) e `result` do Stripe (contém
    last4 do cartão).
  - **Por que é problema:** Violação LGPD/PCI-DSS se logs forem indexados (Datadog,
    CloudWatch).
  - **Como verificar:** `rg "logger.info|console.log.*user"` em projeto — provavelmente
    há helper `maskPII` em lib/.
  - **Eixo violado:** Eixo 5 — Regressão de segurança

### 🟡 IMPORTANTE

- **services/payment.ts** — Sem teste novo
  - **O que:** Função de cobrança crítica sem teste unitário ou mock do Stripe.
  - **Por que é problema:** Regressão silenciosa em mudança futura. Cobrança é
    código onde bug = perda financeira direta.
  - **Como verificar:** adicionar tests/payment.spec.ts com mock de stripe e db.
  - **Eixo violado:** Eixo 7 — Testabilidade

- **services/payment.ts** — `console.log` em vez do logger do projeto
  - **O que:** Projeto usa `lib/logger.ts` (visto em outros services); aqui foi `console.log`.
  - **Eixo violado:** Eixo 3 — Coerência

### ⚪ MENOR

- **services/payment.ts:7** — Currency hardcoded
  - **O que:** "usd" hardcoded; se projeto suportar BRL no futuro, vai ser fix em vários
    lugares. Considere parâmetro ou config.

